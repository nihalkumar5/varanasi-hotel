<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta
      name="description"
      content="Confirmation page for a submitted Vnexora hotel audit."
    />
    <meta name="theme-color" content="#f5f0eb" />
    <title>Vnexora Submission Received</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/portal.css" />
    <link rel="stylesheet" href="/portal-pages.css" />
  </head>
  <body>
    <div class="portal-app" id="portalApp">

      <!-- Page Header -->
      <header class="page-header">
        <a href="/index.html" class="page-back" id="backBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <h1 class="page-title">Submission</h1>
        <div class="page-header-spacer"></div>
      </header>

      <!-- Success Card -->
      <section class="page-card thankyou-card">
        <div class="thankyou-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <p class="card-eyebrow">SUBMISSION COMPLETE</p>
        <h2 class="card-heading">Thanks. The audit has been saved.</h2>
        <p class="card-desc" id="submissionStatus">
          We have stored the latest report in this browser session and sent the lead to the Google Sheets feed.
        </p>

        <div class="thankyou-actions">
          <a class="btn-primary btn-full" href="/index.html">Back to Home</a>
          <a class="btn-secondary btn-full" href="/assessment.html">Start Another Audit</a>
        </div>

        <p class="status-msg" id="saveMessage" aria-live="polite"></p>
      </section>

      <!-- Bottom Spacer for Nav -->
      <div class="bottom-spacer"></div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav" id="bottomNav">
        <a href="/index.html" class="nav-item" id="navHome">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </a>
        <a href="/assessment.html" class="nav-item" id="navAudit">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <span>Audit</span>
        </a>
        <a href="/results.html" class="nav-item" id="navResults">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span>Score</span>
        </a>
        <a href="#" class="nav-item" id="navNotify">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span>Alerts</span>
        </a>
      </nav>

    </div>

    <script src="/thank-you.js"></script>
  </body>
</html>
